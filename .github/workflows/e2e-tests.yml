name: E2E Tests (Tier 1)

# Tier 1 — API-only tests, no EC2 instances, safe to run in CI.
#
# Tiers 2 and 3 require direct SSH access to EC2 instances and must be
# run locally:
#   make test-e2e-tier2   # ~$0.50, 20-30 min, needs AWS_PROFILE=spore-host-dev
#   make test-e2e-tier3   # ~$2-5,  30-45 min, needs AWS_PROFILE=spore-host-dev

on:
  push:
    branches: [main]
    paths:
      - 'spawn/**'
      - 'truffle/**'
      - 'lagotto/**'
  pull_request:
    branches: [main]
    paths:
      - 'spawn/**'
      - 'truffle/**'
      - 'lagotto/**'
  workflow_dispatch:

jobs:
  e2e-tier1:
    name: 'E2E Tier 1 — API only'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_INTEGRATION_TEST_ROLE }}
          role-session-name: e2e-tier1
          aws-region: us-east-1

      - name: Build spawn, truffle, and lagotto binaries
        run: |
          cd spawn && go build -o bin/spawn . && cd ..
          cd truffle && go build -o bin/truffle . && cd ..
          cd lagotto && go build -o bin/lagotto . && cd ..
          echo "$PWD/spawn/bin:$PWD/truffle/bin:$PWD/lagotto/bin" >> $GITHUB_PATH

      - name: Run E2E Tier 1
        run: |
          cd spawn
          go test -v -tags=e2e_tier1 -run TestTier1 -timeout 10m ./test/e2e/
