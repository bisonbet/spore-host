name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# Force bundled Node 20 actions (e.g. github-script inside
# codecov-action@v5) onto Node 24 ahead of GitHub's 2026-06-16 cutover
# (spore-host#345). These jobs run on GitHub-hosted runners.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lambda-tests:
    name: Lambda module tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - module: lambda/rest-api
            min_coverage: '10'   # target 60% (CLAUDE.md); current ~10.8%
          - module: lambda/spore-bot
            min_coverage: '12'   # current ~13.8%
    steps:
      - uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true
          cache-dependency-path: ${{ matrix.module }}/go.sum

      - name: Build
        working-directory: ${{ matrix.module }}
        run: go build ./...

      - name: Test
        working-directory: ${{ matrix.module }}
        run: go test -coverprofile=coverage.out ./...

      - name: Coverage gate
        working-directory: ${{ matrix.module }}
        env:
          MIN_COVERAGE: ${{ matrix.min_coverage }}
        run: |
          total=$(go tool cover -func=coverage.out | awk '/^total:/ {sub(/%/,"",$3); print $3}')
          echo "${{ matrix.module }} coverage: ${total}% (floor: ${MIN_COVERAGE}%)"
          awk -v t="$total" -v m="$MIN_COVERAGE" 'BEGIN { exit !(t+0 >= m+0) }' \
            || { echo "::error::coverage ${total}% is below floor ${MIN_COVERAGE}%"; exit 1; }

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ${{ matrix.module }}/coverage.out
          flags: ${{ matrix.module }}
          fail_ci_if_error: false

      - name: Vet
        working-directory: ${{ matrix.module }}
        run: go vet ./...
