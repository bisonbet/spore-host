# Locked NVIDIA driver versions per EC2 instance family.
# Update deliberately — a bad driver version breaks GPU rendering for ALL apps
# built on that base layer. Test on the target family before bumping.
#
# To check latest: https://www.nvidia.com/en-us/drivers/

nvidia_versions:
  g4dn:
    gpu: "T4"
    driver: "525.105.17"
    cuda: "12.0"
    note: "T4 — widely deployed, cost-effective general purpose GPU"

  g5:
    gpu: "A10G"
    driver: "525.105.17"
    cuda: "12.0"
    note: "A10G — 24GB VRAM, strong visualization performance"

  g6:
    gpu: "L4"
    driver: "535.129.03"
    cuda: "12.2"
    note: "L4 — 24GB VRAM, better perf/$ than g5; default recommendation"

  g6e:
    gpu: "L40S"
    driver: "535.129.03"
    cuda: "12.2"
    note: "L40S — 46GB VRAM; recommended for cryo-EM, lightsheet, large meshes"

  g7e:
    gpu: "RTX PRO 6000"
    driver: "560.x"
    cuda: "12.6"
    status: "future"
    note: "96GB VRAM; very new as of 2026-05, test before use"
