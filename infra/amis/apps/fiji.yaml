name: fiji
base: dcv-cpu-al2
regions: [us-east-1, us-west-2, eu-west-1]
catalog_name: fiji

install: |
  # Java runtime (Fiji bundles its own JRE but system Java helps with dependencies)
  yum install -y java-17-amazon-corretto libXext libXrender

  # Download Fiji/ImageJ
  curl -fsSL "https://downloads.imagej.net/fiji/latest/fiji-linux64.zip" \
    -o /tmp/fiji.zip
  unzip -q /tmp/fiji.zip -d /opt/
  chmod +x /opt/Fiji.app/ImageJ-linux64
  ln -sf /opt/Fiji.app/ImageJ-linux64 /opt/fiji/ImageJ-linux64
  mkdir -p /opt/fiji
  ln -sf /opt/Fiji.app/ImageJ-linux64 /opt/fiji/ImageJ-linux64
  rm /tmp/fiji.zip

test: /opt/Fiji.app/ImageJ-linux64 --version 2>&1 | head -5 || true
launch_command: /opt/fiji/ImageJ-linux64
