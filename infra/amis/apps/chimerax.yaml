name: chimerax
base: dcv-gpu-al2-535
regions: [us-east-1, us-west-2, eu-west-1]
catalog_name: chimerax

install: |
  # System dependencies
  yum install -y mesa-libGL mesa-libGLU libXrender libXtst

  # Download UCSF ChimeraX
  # ChimeraX distributes RPM packages for RHEL/CentOS-compatible systems (AL2)
  VERSION=1.8
  curl -fsSL "https://www.rbvi.ucsf.edu/chimerax/download/1.8/linux/ucsf-chimerax-${VERSION}-centos8.x86_64.rpm" \
    -o /tmp/chimerax.rpm
  yum install -y /tmp/chimerax.rpm
  rm /tmp/chimerax.rpm

  # ChimeraX installs to /usr/bin/chimerax on most Linux distros
  which chimerax || ln -sf /usr/lib64/UCSF-ChimeraX/bin/ChimeraX /usr/local/bin/chimerax

test: chimerax --version
launch_command: /usr/bin/chimerax
