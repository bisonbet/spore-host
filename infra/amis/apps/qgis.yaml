name: qgis
base: dcv-cpu-al2
regions: [us-east-1, us-west-2, eu-west-1]
catalog_name: qgis

install: |
  # QGIS on AL2 via EPEL + QGIS repo
  amazon-linux-extras install -y epel
  yum-config-manager --add-repo https://qgis.org/centos/7/x86_64/
  rpm --import https://download.qgis.org/downloads/qgis-2022.gpg.key
  yum install -y qgis qgis-python3

  # Verify installation
  qgis --version || true

test: qgis --version 2>&1 | grep -i qgis || true
launch_command: /usr/bin/qgis
