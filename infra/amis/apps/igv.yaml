name: igv
base: dcv-cpu-al2
regions: [us-east-1, us-west-2, eu-west-1]
catalog_name: igv

install: |
  # Java runtime
  yum install -y java-17-amazon-corretto

  # Download IGV
  VERSION=2.17.4
  curl -fsSL "https://data.broadinstitute.org/igv/projects/downloads/${VERSION}/IGV_${VERSION}.zip" \
    -o /tmp/igv.zip
  unzip -q /tmp/igv.zip -d /opt/
  mv /opt/IGV_${VERSION} /opt/igv
  chmod +x /opt/igv/igv.sh
  ln -sf /opt/igv/igv.sh /usr/local/bin/igv
  rm /tmp/igv.zip

test: /opt/igv/igv.sh --version 2>&1 | grep -i igv || true
launch_command: /opt/igv/igv.sh
