name: paraview
base: dcv-gpu-al2-535       # uses L4/L40S driver generation (g6, g6e)
regions: [us-east-1, us-west-2, eu-west-1]
catalog_name: paraview       # must match pkg/catalog/catalog.yaml entry

install: |
  # System dependencies
  yum install -y mesa-libGL mesa-libGLU mesa-dri-drivers libXt libXrender

  # Download ParaView binary
  VERSION=5.13.1
  ARCHIVE="ParaView-${VERSION}-MPI-Linux-Python3.10-x86_64.tar.gz"
  curl -fsSL "https://www.paraview.org/paraview-downloads/download.php?submit=Download&version=5.13&type=binary&os=Linux&downloadFile=${ARCHIVE}" \
    -o "/tmp/${ARCHIVE}"
  tar -xzf "/tmp/${ARCHIVE}" -C /opt/
  ln -sf /opt/ParaView-${VERSION}*/bin/paraview /usr/local/bin/paraview
  rm "/tmp/${ARCHIVE}"

test: /usr/local/bin/paraview --version
launch_command: /usr/local/bin/paraview
