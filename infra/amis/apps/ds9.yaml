name: ds9
base: dcv-cpu-al2
regions: [us-east-1, us-west-2, eu-west-1]
catalog_name: ds9

install: |
  # System dependencies
  yum install -y libXft libXrender

  # Download SAOImageDS9 binary
  VERSION=8.6.1
  curl -fsSL "https://ds9.si.edu/download/centos7/ds9.centos7.${VERSION}.tar.gz" \
    -o /tmp/ds9.tar.gz
  tar -xzf /tmp/ds9.tar.gz -C /usr/local/bin/
  chmod +x /usr/local/bin/ds9
  rm /tmp/ds9.tar.gz

test: /usr/local/bin/ds9 -version || true
launch_command: /usr/bin/ds9
